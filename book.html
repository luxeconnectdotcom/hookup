<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<title>Booking Page</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

html,body{
  width:100%;
  overflow-x:hidden;
  background:#f5f7fb;
}

/* COVER */

.cover{
  width:100%;
  height:260px;
  overflow:hidden;
  background:#8b5cf6;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MAIN CONTENT */

.content-wrapper{
  width:100%;
  max-width:1400px;
  margin:0 auto;
  padding:20px;
  display:flex;
  gap:25px;
  align-items:flex-start;
}

/* LEFT SIDE */

.profile-box{
  flex:1;
  background:white;
  border-radius:20px;
  padding:90px 25px 25px;
  position:relative;
  min-width:0;
}

.avatar{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid white;
  position:absolute;
  top:-75px;
  left:25px;
  background:#ddd;
}

.name{
  font-size:30px;
  font-weight:700;
  color:#111827;
}

.bio{
  margin-top:10px;
  color:#6b7280;
  line-height:1.7;
  font-size:15px;
}

/* GALLERY */

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  margin-top:25px;
}

.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:14px;
}

/* RIGHT SIDE */

.booking{
  width:380px;
  background:white;
  border-radius:20px;
  padding:25px;
  position:sticky;
  top:20px;
}

.booking h3{
  margin-bottom:15px;
  color:#111827;
}

.booking input,
.booking select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
  outline:none;
}

.booking input:focus,
.booking select:focus{
  border-color:#8b5cf6;
}

.btn{
  width:100%;
  border:none;
  margin-top:18px;
  padding:15px;
  border-radius:999px;
  background:linear-gradient(90deg,#ff4d6d,#8b5cf6);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

  .content-wrapper{
    flex-direction:column;
  }

  .booking{
    width:100%;
    position:static;
  }

}

@media(max-width:600px){

  .cover{
    height:180px;
  }

  .profile-box{
    padding:85px 15px 20px;
  }

  .avatar{
    width:120px;
    height:120px;
    top:-60px;
    left:15px;
  }

  .name{
    font-size:24px;
  }

  .gallery{
    grid-template-columns:repeat(2,1fr);
  }

  .gallery img{
    height:180px;
  }

}

</style>

<style>
  .stats{
  display:flex;
  gap:25px;
  margin-top:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.stat-item{
  font-size:14px;
  color:#6b7280;
}

.stat-item strong{
  color:#111827;
  font-size:16px;
}

.hashtags{
  margin-top:12px;
  color:#8b5cf6;
  font-weight:600;
  line-height:1.6;
}

.profile-meta{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.meta-row{
  color:#374151;
  font-size:15px;
  font-weight:500;
}

.meta-row span{
  color:#111827;
  font-weight:700;
}
</style>

<style>
  .name-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.verified-badge{
  color:#1d9bf0;
  font-size:18px;
}

.stat-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  color:#6b7280;
}

.stat-item i{
  color:#8b5cf6;
}

.meta-row{
  display:flex;
  align-items:center;
  gap:10px;
  color:#374151;
  font-size:15px;
}

.meta-row i{
  width:18px;
  color:#8b5cf6;
}

.meta-row span{
  color:#111827;
  font-weight:700;
}
</style>


</head>

<body>

<!-- COVER -->

<div class="cover">
  <img id="coverImg" src="">
</div>

<!-- PROFILE + BOOKING ROW -->

<div class="content-wrapper">

  <!-- PROFILE -->

  <div class="profile-box">

    <img id="avatar" class="avatar">

<div class="name-row">

  <div class="name" id="name"></div>

  <i
    class="fa-solid fa-circle-check verified-badge"
    id="verifiedBadge">
  </i>

</div>

<div class="stats">

  <div class="stat-item">
    <i class="fa-solid fa-heart"></i>
    <strong id="likes">0</strong>
    Likes
  </div>

  <div class="stat-item">
    <i class="fa-solid fa-users"></i>
    <strong id="followers">0</strong>
    Followers
  </div>

</div>

<div class="bio" id="bio"></div>

<div class="hashtags" id="hashtags"></div>

<div class="profile-meta">

  <div class="meta-row">

    <i class="fa-solid fa-location-dot"></i>

    <span id="profileLocation">
      Not specified
    </span>

  </div>

  <div class="meta-row">

    <i class="fa-solid fa-money-bill-wave"></i>

    <span id="profilePrice">
      Not specified
    </span>

  </div>

</div>

    <div class="gallery" id="gallery"></div>

  </div>

  <!-- BOOKING -->

  <div class="booking">

    <h3>Book Session</h3>

    <select id="service">
      <option value="brief">Brief Hangout</option>
      <option value="long">Long Hangout</option>
    </select>

    <input
      id="location"
      type="text"
      placeholder="Meetup location/address">

    <input id="date" type="date">

    <input id="time" type="time">

    <input
      id="amount"
      type="number"
      placeholder="Booking amount">

    <button
      class="btn"
      onclick="confirmBooking()">
      Confirm Booking
    </button>

  </div>

</div>

<script>

const profile =
JSON.parse(localStorage.getItem("selectedProfile"));

document.getElementById("name").textContent =
profile?.name || "";

document.getElementById("bio").textContent =
profile?.caption || "";

document.getElementById("likes").textContent =
profile?.likes || 0;

document.getElementById("followers").textContent =
profile?.followers || 0;

document.getElementById("hashtags").textContent =
profile?.hashtags || "";

document.getElementById("profileLocation").textContent =
profile?.location || "Not specified";

document.getElementById("profilePrice").textContent =
profile?.price
  ? "$" + profile.price
  : "Not specified";

document.getElementById("avatar").src =
profile?.avatar || "";

document.getElementById("coverImg").src =
(profile?.photos?.[0]) || profile?.avatar || "";

const gallery =
document.getElementById("gallery");

(profile?.photos || []).forEach(photo => {

  const img = document.createElement("img");

  img.src = photo;

  gallery.appendChild(img);

});

</script>

</body>
</html>
