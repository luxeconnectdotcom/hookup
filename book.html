<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<title>Booking Page</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

html,body{
  width:100%;
  overflow-x:hidden;
  background:#f5f7fb;
}

/* COVER */

.cover{
  width:100%;
  height:260px;
  overflow:hidden;
  background:#8b5cf6;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MAIN CONTENT */

.content-wrapper{
  width:100%;
  max-width:1400px;
  margin:0 auto;
  padding:20px;
  display:flex;
  gap:25px;
  align-items:flex-start;
}

/* LEFT SIDE */

.profile-box{
  flex:1;
  background:white;
  border-radius:20px;
  padding:90px 25px 25px;
  position:relative;
  min-width:0;
}

.avatar{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid white;
  position:absolute;
  top:-75px;
  left:25px;
  background:#ddd;
}

.name{
  font-size:30px;
  font-weight:700;
  color:#111827;
}

.bio{
  margin-top:10px;
  color:#6b7280;
  line-height:1.7;
  font-size:15px;
}

/* GALLERY */

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  margin-top:25px;
}

.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:14px;
}

/* RIGHT SIDE */

.booking{
  width:380px;
  background:white;
  border-radius:20px;
  padding:25px;
  position:sticky;
  top:20px;
}

.booking h3{
  margin-bottom:15px;
  color:#111827;
}

.booking input,
.booking select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
  outline:none;
}

.booking input:focus,
.booking select:focus{
  border-color:#8b5cf6;
}

.btn{
  width:100%;
  border:none;
  margin-top:18px;
  padding:15px;
  border-radius:999px;
  background:linear-gradient(90deg,#ff4d6d,#8b5cf6);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

  .content-wrapper{
    flex-direction:column;
  }

  .booking{
    width:100%;
    position:static;
  }

}

@media(max-width:600px){

  .cover{
    height:180px;
  }

  .profile-box{
    padding:85px 15px 20px;
  }

  .avatar{
    width:120px;
    height:120px;
    top:-60px;
    left:15px;
  }

  .name{
    font-size:24px;
  }

  .gallery{
    grid-template-columns:repeat(2,1fr);
  }

  .gallery img{
    height:180px;
  }

}

</style>

<style>
  .stats{
  display:flex;
  gap:25px;
  margin-top:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.stat-item{
  font-size:14px;
  color:#6b7280;
}

.stat-item strong{
  color:#111827;
  font-size:16px;
}

.hashtags{
  margin-top:12px;
  color:#8b5cf6;
  font-weight:600;
  line-height:1.6;
}

.profile-meta{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.meta-row{
  color:#374151;
  font-size:15px;
  font-weight:500;
}

.meta-row span{
  color:#111827;
  font-weight:700;
}
</style>

<style>
  .name-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.verified-badge{
  color:#1d9bf0;
  font-size:18px;
}

.stat-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  color:#6b7280;
}

.stat-item i{
  color:#8b5cf6;
}

.meta-row{
  display:flex;
  align-items:center;
  gap:10px;
  color:#374151;
  font-size:15px;
}

.meta-row i{
  width:18px;
  color:#8b5cf6;
}

.meta-row span{
  color:#111827;
  font-weight:700;
}
</style>


<style>
  .input-pill{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  margin-top:12px;
  background:white;
}

.input-pill input{
  border:none;
  outline:none;
  width:100%;
  font-size:16px;
}

.input-pill i{
  color:#8b5cf6;
}

.info-pill{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  margin-top:12px;
  background:white;
  cursor:pointer;
}

.info-pill i{
  color:#8b5cf6;
}

.fee-box{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  background:linear-gradient(135deg,#f5f3ff,#ffffff);
  border:1px solid #ede9fe;
}

.fee-box i{
  font-size:20px;
  color:#8b5cf6;
}

.fee-box small{
  color:#6b7280;
}

.fee-box h4{
  margin:0;
  font-size:18px;
}

.pay-title{
  margin-top:15px;
  font-size:14px;
  color:#6b7280;
}

.payment-details{
  margin-top:10px;
  font-size:13px;
  color:#374151;
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.5);
}

.modal-content{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.modal-content i{
  font-size:40px;
  color:green;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.4);
  color:white;
}
</style>

<style>
  /* validation */
.error-field{
  border:1px solid #ef4444 !important;
  box-shadow:0 0 0 3px rgba(239,68,68,0.1);
}

.error-text{
  font-size:12px;
  color:#ef4444;
  margin-top:6px;
}

/* payment card */
.payment-card{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  font-size:13px;
  color:#374151;
  display:none;
  line-height:1.5;
}

.payment-card strong{
  color:#111827;
}
</style>

</head>

<body>

<!-- COVER -->

<div class="cover">
  <img id="coverImg" src="">
</div>

<!-- PROFILE + BOOKING ROW -->

<div class="content-wrapper">

  <!-- PROFILE -->

  <div class="profile-box">

    <img id="avatar" class="avatar">

<div class="name-row">

  <div class="name" id="name"></div>

  <i
    class="fa-solid fa-circle-check verified-badge"
    id="verifiedBadge">
  </i>

</div>

<div class="stats">

  <div class="stat-item">
    <i class="fa-solid fa-heart"></i>
    <strong id="likes">0</strong>
    Likes
  </div>

  <div class="stat-item">
    <i class="fa-solid fa-users"></i>
    <strong id="followers">0</strong>
    Followers
  </div>

</div>

<div class="bio" id="bio"></div>

<div class="hashtags" id="hashtags"></div>

<div class="profile-meta">

  <div class="meta-row">

    <i class="fa-solid fa-location-dot"></i>

    <span id="profileLocation">
      Not specified
    </span>

  </div>

  <div class="meta-row">

    <i class="fa-solid fa-money-bill-wave"></i>

    <span id="profilePrice">
      Not specified
    </span>

  </div>

</div>

    <div class="gallery" id="gallery"></div>

  </div>

  <!-- BOOKING -->

<div class="booking">

  <h3>Book Session</h3>

  <!-- SERVICE / PACKAGE -->
  <select id="service">
    <option value="">Select Service / Package</option>
  </select>

  <!-- LOCATION (icon inside right) -->
  <div class="input-pill">
    <input id="location" type="text" placeholder="Meetup location/address">
    <i class="fa-solid fa-location-dot"></i>
  </div>

  <!-- DATE -->
  <div class="info-pill">
    <i class="fa-regular fa-calendar"></i>
    <p id="dateText">Date: Not selected</p>
    <input id="date" type="date" hidden>
  </div>

  <!-- TIME -->
  <div class="info-pill">
    <i class="fa-regular fa-clock"></i>
    <p id="timeText">Time: Not selected</p>
    <input id="time" type="time" hidden>
  </div>

  <!-- FEE DISPLAY (NOT INPUT) -->
  <div class="fee-box">
    <i class="fa-solid fa-money-bill-wave"></i>
    <div>
      <small>Fee</small>
      <h4 id="feeDisplay">$0</h4>
    </div>
  </div>

  <!-- PAYMENT METHODS -->
  <h4 class="pay-title">Payment Method</h4>

  <select id="paymentMethod">
    <option value="">Select Payment Method</option>
    <option value="giftcard">Gift Card</option>
    <option value="paypal">PayPal</option>
    <option value="btc">Bitcoin (BTC)</option>
  </select>

  <!-- PAYMENT DETAILS -->
  <div class="payment-details" id="paymentDetails">
    Select a payment method to view details
  </div>

  <button class="btn" onclick="confirmBooking()">
    Confirm Booking
  </button>

</div>

<!-- SUCCESS MODAL -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <i class="fa-solid fa-circle-check"></i>
    <h2>Booking Successful</h2>
    <p>Your session has been booked successfully.</p>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div class="overlay" id="loadingOverlay">
  <div class="loader"></div>
  <p>Processing booking...</p>
</div>

</div>



<script>

const profile =
JSON.parse(localStorage.getItem("selectedProfile"));

if (!profile) {
  alert("Profile not found");
  window.location.href = "dashboard.html";
}

/* ======================
   BASIC PROFILE FIELDS
====================== */

document.getElementById("name").textContent = profile.name || "";
document.getElementById("bio").textContent = profile.caption || "";
document.getElementById("likes").textContent = profile.likes || 0;
document.getElementById("followers").textContent = profile.followers || 0;
document.getElementById("hashtags").textContent = profile.hashtags || "";

/* ======================
   LOCATION
====================== */

const locationValue =
  profile.location ||
  (profile.status ? profile.status.split("•")[0].trim() : "");

document.getElementById("profileLocation").textContent =
  locationValue || "Not specified";

/* ======================
   PRICE DISPLAY
====================== */

const lowestPrice =
  profile.lowPrice ||
  profile.basicPrice ||
  profile.mediumPrice ||
  profile.standardPrice ||
  profile.premiumPrice;

document.getElementById("profilePrice").textContent =
  lowestPrice ? "$" + lowestPrice : "Not specified";

/* ======================
   IMAGES
====================== */

document.getElementById("avatar").src = profile.avatar || "";

document.getElementById("coverImg").src =
  (profile.photos && profile.photos.length)
    ? profile.photos[0]
    : profile.avatar || "";

/* ======================
   PHOTO GRID
====================== */

const gallery = document.getElementById("gallery");
gallery.innerHTML = "";

if (profile.photos && profile.photos.length > 0) {

  profile.photos.forEach(photo => {
    const img = document.createElement("img");
    img.src = photo;
    gallery.appendChild(img);
  });

} else if (profile.avatar) {
  const img = document.createElement("img");
  img.src = profile.avatar;
  gallery.appendChild(img);
}

/* ======================
   SERVICE → PRICE LOGIC
====================== */

const serviceSelect = document.getElementById("service");
const feeDisplay = document.getElementById("feeDisplay");

const packages = [
  { label: "Low", value: profile.lowPrice },
  { label: "Basic", value: profile.basicPrice },
  { label: "Medium", value: profile.mediumPrice },
  { label: "Standard", value: profile.standardPrice },
  { label: "Premium", value: profile.premiumPrice }
];

serviceSelect.innerHTML =
  `<option value="">Select Service / Package</option>`;

packages.forEach(pkg => {
  if (pkg.value !== undefined && pkg.value !== null && pkg.value !== "") {

    const option = document.createElement("option");
    option.value = pkg.value;
    option.textContent = `${pkg.label} - $${pkg.value}`;
    serviceSelect.appendChild(option);

  }
});

serviceSelect.addEventListener("change", function () {
  feeDisplay.textContent = this.value ? "$" + this.value : "$0";
});

/* ======================
   DATE / TIME (FIXED UX)
====================== */

const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");

const dateText = document.getElementById("dateText");
const timeText = document.getElementById("timeText");

/* FIX: direct element binding (no nth-child hacks) */
document.querySelectorAll(".info-pill")[0]
  .addEventListener("click", () => {
    dateInput.showPicker?.() || dateInput.click();
  });

document.querySelectorAll(".info-pill")[1]
  .addEventListener("click", () => {
    timeInput.showPicker?.() || timeInput.click();
  });

dateInput.addEventListener("change", () => {
  const formatted = new Date(dateInput.value).toDateString();
  dateText.textContent = "Date: " + formatted;
});

timeInput.addEventListener("change", () => {
  timeText.textContent = "Time: " + timeInput.value;
});

/* ======================
   SUCCESS MODAL
====================== */

function showSuccessModal() {

  const modal = document.getElementById("successModal");
  modal.style.display = "flex";

  setTimeout(() => {
    modal.style.display = "none";
    window.location.href = "bookedsessions.html";
  }, 1800);

}

/* ======================
   BOOKING
====================== */

async function confirmBooking() {

  const user = JSON.parse(localStorage.getItem("luxeUser"));

  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  if (!serviceSelect.value || !dateInput.value || !timeInput.value) {
    alert("Please complete all booking fields");
    return;
  }

  document.getElementById("loadingOverlay").style.display = "flex";

  const payload = {
    action: "createBooking",
    workerId: profile.id,
    workerName: profile.name,
    userId: user.uid,
    userName: user.name,
    service: serviceSelect.options[serviceSelect.selectedIndex].text,
    location: document.getElementById("location").value,
    date: dateInput.value,
    time: timeInput.value,
    amount: serviceSelect.value
  };

  try {

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwsrg89zEsQ7oA_00NOrONLZagmkjl0vEhJskL5CqqzXG1ehPCLlJZ13V_T5JP2EcCtyw/exec",
      {
        method: "POST",
        body: JSON.stringify(payload)
      }
    );

    const data = await res.json();

    document.getElementById("loadingOverlay").style.display = "none";

    if (data.status) {
      showSuccessModal();
    } else {
      alert(data.message || "Booking failed");
    }

  } catch (err) {
    document.getElementById("loadingOverlay").style.display = "none";
    console.error(err);
    alert("Network error");
  }
}

</script>



</body>

</html>
