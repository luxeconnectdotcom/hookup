<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <title>Booked Sessions • LuxeConnect</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #111827;
      min-height: 100vh;
    }

    /* HERO */

    .hero {
      max-width: 1200px;
      margin: auto;
      padding: 35px 24px;
    }

    .hero-card {
      background: linear-gradient(135deg,
          #8b5cf6,
          #6d28d9);
      border-radius: 28px;
      padding: 35px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .hero h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .hero p {
      max-width: 600px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
    }

    /* SECTION */

    .section {
      max-width: 1200px;
      margin: auto;
      padding: 0 24px 40px;
      margin-top: 20px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title h3 {
      font-size: 20px;
      font-weight: 800;
    }

    .count-pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: white;
      border: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 13px;
    }

    /* CONTAINER */

    .container {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* CARD */

    .card {
      background: white;
      border: 1px solid #edf0f6;
      border-radius: 24px;
      padding: 22px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: .25s;
      box-shadow:
        0 4px 18px rgba(17, 24, 39, .04);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 12px 28px rgba(17, 24, 39, .08);
    }

    .card img {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      object-fit: cover;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .info {
      flex: 1;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
    }

    .subtitle {
      margin-top: 4px;
      color: #6b7280;
      font-size: 14px;
    }

    /* STATUS */

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pending {
      background: #fff7e6;
      color: #b45309;
    }

    .paid {
      background: #ecfdf5;
      color: #047857;
    }

    /* DETAILS */

    .details-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns:
        repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .detail-box {
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 14px;
    }

    .detail-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .detail-value {
      font-size: 14px;
      color: #111827;
      font-weight: 700;
      line-height: 1.5;
    }

    .detail-value i {
      color: #8b5cf6;
      margin-right: 6px;
    }

    /* EMPTY */

    .empty {
      background: white;
      border-radius: 24px;
      padding: 70px 20px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .empty i {
      font-size: 52px;
      color: #cbd5e1;
      margin-bottom: 16px;
    }

    .empty h3 {
      margin-bottom: 8px;
    }

    .empty p {
      color: #6b7280;
    }

    /* LOADING */

    .loading {
      background: white;
      border-radius: 24px;
      padding: 70px 20px;
      text-align: center;
      border: 1px solid #e5e7eb;
      color: #6b7280;
    }

    .loading i {
      font-size: 42px;
      margin-bottom: 15px;
      color: #8b5cf6;
    }

    /* MOBILE */

    @media(max-width:768px) {

      .hero h1 {
        font-size: 28px;
      }

      .card {
        flex-direction: column;
      }

      .card img {
        width: 100%;
        height: 220px;
        border-radius: 18px;
      }

      .title-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .details-grid {

        grid-template-columns: 1fr 1fr;

      }


    }
  </style>

  <style>
    a {
      text-decoration: none;
      color: inherit;
    }

    .navbar {
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      height: 78px;
      padding: 0 6%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229, 231, 235, .8);
    }

    .logo {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff4d6d, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      color: #374151;
      font-weight: 600;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mobile-only {
      display: none;
    }

    .menu-toggle {
      display: none;
    }

    /* ACCOUNT */

    .account-wrapper {
      position: relative;
    }

    .account-pill {
      border: none;
      background: white;
      height: 52px;
      padding: 0 18px;
      border-radius: 999px;

      display: flex;
      align-items: center;
      gap: 12px;

      cursor: pointer;
      font-weight: 700;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, .08);
    }

    .account-pill .fa-user {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;

      background:
        linear-gradient(135deg, #ff4d6d, #8b5cf6);
    }

    .chevron {
      color: #6b7280;
    }

    /* DROPDOWN */

    .dropdown {
      position: absolute;
      right: 0;
      top: 68px;

      width: 220px;
      background: white;

      border-radius: 22px;
      padding: 10px;

      display: none;
      flex-direction: column;
      gap: 4px;

      box-shadow:
        0 25px 50px rgba(0, 0, 0, .15);
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown a {
      padding: 14px 16px;
      border-radius: 14px;
      transition: .2s;
    }

    .dropdown a:hover {
      background: #f3f4f6;
    }

    /* ICON BUTTONS */

    .mobile-nav-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 18px;

      background: white;
      cursor: pointer;

      font-size: 1.1rem;

      position: relative;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, .08);
    }

    .alert-dot::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;

      width: 10px;
      height: 10px;

      border-radius: 50%;
      background: #ff4d6d;
    }

    /* MOBILE */

    .drawer-account {
      display: flex;
      align-items: center;
      gap: 14px;

      background: #f8fafc;

      border-radius: 18px;
      padding: 15px;

      margin-bottom: 25px;
    }

    .drawer-account i {
      width: 45px;
      height: 45px;

      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;

      background:
        linear-gradient(135deg, #ff4d6d, #8b5cf6);
    }

    .mobile-buttons {
      display: none;
    }

    .logout-btn {
      width: 100%;
      border: none;
      padding: 14px;

      border-radius: 999px;
      color: white;
      font-weight: 700;
      cursor: pointer;

      background:
        linear-gradient(90deg, #ff4d6d, #8b5cf6);
    }

    @media(max-width:900px) {

      .desktop-buttons .account-wrapper {
        display: none;
      }

      .menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;

        width: 46px;
        height: 46px;

        border: none;
        border-radius: 14px;

        background: #f3f4f6;
        cursor: pointer;

        font-size: 1.1rem;
      }

      .mobile-only {
        display: block;
      }

      .nav-links {
        position: fixed;
        top: 0;
        right: -320px;

        width: 300px;
        height: 100vh;

        background: rgba(255, 255, 255, .98);
        backdrop-filter: blur(20px);

        flex-direction: column;
        gap: 22px;

        padding: 70px 30px 40px;

        transition: .35s;
      }

      .nav-links.active {
        right: 0;
      }

      .nav-links a {
        width: 100%;
        padding-bottom: 14px;
        border-bottom: 1px solid #f1f5f9;
      }

      .mobile-buttons {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      body.drawer-open::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .35);
        backdrop-filter: blur(3px);
        z-index: 999;
      }
    }
  </style>


</head>

<body>


  <!-- NAVBAR -->

  <nav class="navbar">

    <!-- LOGO -->
    <a href="index.html" class="logo">
      LuxeConnect
    </a>

  </nav>

  <!-- HERO -->

<!--
  <div class="hero">

    <div class="hero-card">

      <h1>My Booked Sessions</h1>

      <p>
        View and manage all your booked service providers,
        appointment schedules, payment status, and session
        information in one place.
      </p>

    </div>

  </div>
-->

  <!-- BOOKINGS -->

  <div class="section">

    <div class="section-title">

      <h3>Active Bookings</h3>

      <div class="count-pill">
        Session Records
      </div>

    </div>

    <div class="container" id="container">

      <div class="loading">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Loading your bookings...</p>
      </div>

    </div>

  </div>

  <script>

    const user = JSON.parse(localStorage.getItem("luxeUser"));

    if (!user) {
      window.location.href = "login.html";
    }

    async function loadBookings() {

      const res = await fetch("https://script.google.com/macros/s/AKfycbwsrg89zEsQ7oA_00NOrONLZagmkjl0vEhJskL5CqqzXG1ehPCLlJZ13V_T5JP2EcCtyw/exec", {
        method: "POST",
        body: JSON.stringify({
          action: "getUserBookings",
          userId: user.uid
        })
      });

      const data = await res.json();

      const container = document.getElementById("container");
      container.innerHTML = "";

      if (!data.status || data.bookings.length === 0) {

        container.innerHTML = `
      <div class="empty">
        <i class="fa-regular fa-calendar-xmark"></i>
        <h3>No Bookings Found</h3>
        <p>You have not booked any sessions yet.</p>
      </div>
    `;

        return;
      }

      data.bookings.forEach(b => {

        const worker = b.worker || {};

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `

      <img src="${worker.avatar || ''}" alt="Provider">

      <div class="info">

        <div class="title-row">

          <div>

            <div class="title">
              ${b.workerName}
            </div>

            <div class="subtitle">
              Service Provider
            </div>

          </div>

          <div class="badge ${b.paymentStatus === 'Paid' ? 'paid' : 'pending'}">
            ${b.paymentStatus}
          </div>

        </div>

        <div class="details-grid">

          <div class="detail-box">
            <div class="detail-label">Service</div>
            <div class="detail-value">
              <i class="fa-solid fa-briefcase"></i>
              ${b.service}
            </div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Date & Time</div>
            <div class="detail-value">
              <i class="fa-regular fa-calendar"></i>
              ${b.date} <span style="color:blue">(${b.time})</span>
            </div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Location</div>
            <div class="detail-value">
              <i class="fa-solid fa-location-dot"></i>
              ${b.location}
            </div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Amount</div>
            <div class="detail-value">
              <i class="fa-solid fa-dollar-sign"></i>
              ${b.amount}
            </div>
          </div>

          <div class="detail-box">
            <div class="detail-label">Payment Method</div>
            <div class="detail-value">
              <i class="fa-solid fa-credit-card"></i>
              ${b.paymentMethod || 'N/A'}
            </div>
          </div>

        </div>

      </div>

    `;

        container.appendChild(card);
      });
    }

    loadBookings();

  </script>




</body>

</html>
